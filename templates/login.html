{% extends "base.html" %}

{% block title %}Login | EduTrack AI{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 40px auto;">
    <div class="card">
        <div style="text-align: center; margin-bottom: 24px;">
            <div style="width: 48px; height: 48px; background-color: #EFF6FF; color: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; margin: 0 auto 16px;">
                <i class="fa-solid fa-user"></i>
            </div>
            <h2 style="font-size: 24px; font-weight: 700;">Welcome Back</h2>
            <p style="color: var(--text-muted); font-size: 14px; margin-top: 4px;">Sign in to your EduTrack AI account</p>
        </div>

        <form action="/login" method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" class="form-control" required placeholder="name@example.com">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn btn-primary btn-block" style="margin-top: 16px;">
                Sign In
            </button>
        </form>

        <p style="text-align: center; margin-top: 24px; font-size: 14px; color: var(--text-muted);">
            Don't have an account? <a href="/register" style="color: var(--primary); font-weight: 600; text-decoration: none;">Create one</a>
        </p>
    </div>
</div>
{% endblock %}
