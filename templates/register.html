{% extends "base.html" %}

{% block title %}Register | EduTrack AI{% endblock %}

{% block content %}
<div style="max-width: 450px; margin: 40px auto;">
    <div class="card">
        <div style="text-align: center; margin-bottom: 24px;">
            <div style="width: 48px; height: 48px; background-color: #EFF6FF; color: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; margin: 0 auto 16px;">
                <i class="fa-solid fa-user-plus"></i>
            </div>
            <h2 style="font-size: 24px; font-weight: 700;">Create an Account</h2>
            <p style="color: var(--text-muted); font-size: 14px; margin-top: 4px;">Join EduTrack AI today</p>
        </div>

        <form action="/register" method="POST">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="full_name" class="form-control" required placeholder="John Doe">
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" class="form-control" required placeholder="name@example.com">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" required placeholder="Create a password">
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password" class="form-control" required placeholder="Confirm your password">
            </div>

            <button type="submit" class="btn btn-primary btn-block" style="margin-top: 16px;">
                Create Account
            </button>
        </form>

        <p style="text-align: center; margin-top: 24px; font-size: 14px; color: var(--text-muted);">
            Already have an account? <a href="/login" style="color: var(--primary); font-weight: 600; text-decoration: none;">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}
